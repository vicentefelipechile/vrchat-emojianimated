name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]*"   # triggers on v0.1.0, v1.2.3, etc.

permissions:
  contents: write   # needed to create the GitHub Release

# ==============================================================================
# Both build jobs run in parallel, upload their binary as an Actions artifact,
# then the publish job waits for both, downloads them, and creates the release.
# This avoids the race condition of two jobs writing to the same release at once.
# ==============================================================================

jobs:
  # ============================================================================
  # Windows x64
  # ============================================================================
  build-windows:
    name: Build · Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      # --no-bundle skips NSIS/MSI generation; the raw .exe is still built.
      - name: Build Tauri app (no installer)
        run: npx tauri build --target x86_64-pc-windows-msvc --no-bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Rename binary
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $src = "src-tauri\target\x86_64-pc-windows-msvc\release\vrchat-emojianimated.exe"
          $dst = "vrchat-emojianimate_${tag}_windows-x64.exe"
          Copy-Item -Path $src -Destination $dst
          echo "BINARY_NAME=$dst" >> $env:GITHUB_ENV

      - name: Upload binary as Actions artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-windows-x64
          path: ${{ env.BINARY_NAME }}
          if-no-files-found: error
          retention-days: 1

  # ============================================================================
  # Ubuntu x64
  # ============================================================================
  build-linux:
    name: Build · Ubuntu x64
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Tauri on Linux requires WebKit2GTK and several GTK/glib headers.
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libglib2.0-dev

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      # --no-bundle skips AppImage/deb/rpm generation; the raw ELF binary is kept.
      - name: Build Tauri app (no installer)
        run: npx tauri build --target x86_64-unknown-linux-gnu --no-bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Rename binary
        run: |
          TAG="${{ github.ref_name }}"
          SRC="src-tauri/target/x86_64-unknown-linux-gnu/release/vrchat-emojianimated"
          DST="vrchat-emojianimate_${TAG}_linux-x64"
          cp "$SRC" "$DST"
          chmod +x "$DST"
          echo "BINARY_NAME=$DST" >> "$GITHUB_ENV"

      - name: Upload binary as Actions artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-linux-x64
          path: ${{ env.BINARY_NAME }}
          if-no-files-found: error
          retention-days: 1

  # ============================================================================
  # Publish GitHub Release
  # ============================================================================
  publish-release:
    name: Publish GitHub Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets     # each artifact lands in its own sub-folder
          merge-multiple: false

      - name: List collected assets (debug)
        run: find release-assets -type f | sort

      - name: Create GitHub Release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}   # v1.0.0-beta → pre-release
          generate_release_notes: true
          body: |
            > [!NOTE]
            > ### 📥 How to download and use
            > 
            > 1. Scroll down to the **Assets** section at the bottom of these notes.
            > 2. Download the right file for your operating system:
            
            | Operating System | File to Download | Instructions |
            | :--- | :--- | :--- |
            | **Windows** | `vrchat-emojianimate_${{ github.ref_name }}_windows-x64.exe` | **No installation required!** Double-click to run. *(If SmartScreen warns you, click "More info" → "Run anyway")*. |
            | **Linux** | `vrchat-emojianimate_${{ github.ref_name }}_linux-x64` | Open terminal, give it permissions (`chmod +x`), and execute it. |
          files: |
            release-assets/**/*
